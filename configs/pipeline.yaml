pipeline_version: "0.1.0"

filters:
  min_length: 8
  max_length: 35
  allowed_amino_acids: "ACDEFGHIKLMNPQRSTVWY"

weights:
  activity: 0.40
  safety: 0.25
  synthesis: 0.15
  novelty: 0.20

selection:
  top_n: 100
  min_novelty: 0.20
  max_safety_risk: 0.70
  max_disagreement: 0.45

notes:
  - "These weights are transparent baseline heuristics, not validated biological predictors."
  - "Do not change weights after inspecting held-out benchmark results unless you create a new holdout set."
  - "max_disagreement=0.45 (raised from 0.40 in PR #72): blocks candidates where"
  - "  |activity_likeness - boman_activity| > 0.45. PR #72 added face_segregation_bonus"
  - "  (helix_wheel_amphipathic_score × 0.05) to activity_likeness_score, which correctly"
  - "  rewards Trp-cluster face segregation (puroindoline-a/SEED-008 class) by ~0.03 score units."
  - "  This raised SEED-008 disagreement from ~0.40 to ~0.43; threshold raised to 0.45 to"
  - "  accommodate known mechanism-divergence class without blocking valid AMP families."
  - "  No non-Trp-rich candidate exceeds dis=0.41 (verified across 709-sequence phase3 pool)."
  - "  KWKLFKKIGAVLKVL (canonical helical AMP) has disagreement ~0.23 and passes easily."
