name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint changed verifier files
        run: |
          ruff check \
            src/openamp_foundry/reproducibility.py \
            tests/release/test_run_manifest_verifier.py

      - name: Unit and integration tests
        run: pytest -q --tb=short

      - name: Demo pipeline
        run: make demo
